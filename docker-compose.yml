version: "3.8"
services:
  app:
    build:
      context: .
      network: host
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=debug
      - CORS_ALLOWED_ORIGINS=*
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=crm_user
      - DB_PASSWORD=crm_password
      - DB_NAME=crm_db
      - DB_SSLMODE=disable
      - DB_TIMEZONE=UTC
      - DB_AUTO_MIGRATE=true
      - KEYCLOAK_BASE_URL=http://keycloak:8080
      - KEYCLOAK_ADMIN_REALM=crm-admin
      - KEYCLOAK_CLIENT_REALM=crm-clients
      - KEYCLOAK_ADMIN_REQUIRED_ROLE=CRM
      - TENANT_HEADER=X-Tenant-ID
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_password
      - POSTGRES_DB=crm_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@crm.com
      - PGADMIN_DEFAULT_PASSWORD=adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
