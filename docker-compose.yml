version: "3.8"
services:
  app:
    build:
      context: .
      network: host
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=crm_user
      - DB_PASSWORD=crm_password
      - DB_NAME=crm_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey123
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_password
      - POSTGRES_DB=crm_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@crm.com
      - PGADMIN_DEFAULT_PASSWORD=adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
