openapi: 3.0.3
info:
  title: CRM Backend API
  version: 1.0.0
  description: API documentation for the CRM Backend service.
servers:
  - url: /
    description: Current host
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Admin Tenants
    description: Tenant management endpoints for CRM administrators.
  - name: Templates
    description: Dynamic lead template endpoints.
  - name: Fields
    description: Dynamic lead template field endpoints.
  - name: Leads
    description: Lead record endpoints.
paths:
  /api/admin/tenants:
    post:
      tags:
        - Admin Tenants
      summary: Create tenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
            example:
              name: Acme Corp
              slug: acme
              description: Pilot customer
      responses:
        "201":
          description: Tenant created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags:
        - Admin Tenants
      summary: List tenants
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TenantStatus"
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search text matched against tenant name and slug.
      responses:
        "200":
          description: Tenant page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/admin/tenants/{id}:
    get:
      tags:
        - Admin Tenants
      summary: Get tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags:
        - Admin Tenants
      summary: Update tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
            example:
              name: Acme Corporation
              description: Upgraded account
              status: active
      responses:
        "200":
          description: Updated tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Admin Tenants
      summary: Delete tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "204":
          description: Tenant deleted.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/templates:
    post:
      tags:
        - Templates
      summary: Create lead template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadTemplateRequest"
            example:
              name: B2B Sales Lead
      responses:
        "201":
          description: Template created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadTemplate"
        "400":
          $ref: "#/components/responses/LegacyBadRequest"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
    get:
      tags:
        - Templates
      summary: List lead templates
      responses:
        "200":
          description: Template list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadTemplate"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
  /api/templates/{id}:
    get:
      tags:
        - Templates
      summary: Get lead template
      parameters:
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          description: Template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadTemplate"
        "404":
          $ref: "#/components/responses/LegacyNotFound"
    put:
      tags:
        - Templates
      summary: Update lead template
      parameters:
        - $ref: "#/components/parameters/NumericID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadTemplateRequest"
            example:
              name: Enterprise Sales Lead
      responses:
        "200":
          description: Updated template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadTemplate"
        "400":
          $ref: "#/components/responses/LegacyBadRequest"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
    delete:
      tags:
        - Templates
      summary: Delete lead template
      parameters:
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          $ref: "#/components/responses/DeleteMessage"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
  /api/templates/{id}/fields:
    post:
      tags:
        - Fields
      summary: Add field to template
      parameters:
        - $ref: "#/components/parameters/NumericID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadFieldRequest"
            example:
              name: contactEmail
              type: string
              format: email
              required: true
      responses:
        "201":
          description: Field created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadField"
        "400":
          $ref: "#/components/responses/LegacyBadRequest"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
    get:
      tags:
        - Fields
      summary: List template fields
      parameters:
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          description: Field list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadField"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
  /api/templates/{id}/schema:
    get:
      tags:
        - Templates
      summary: Get template schema
      parameters:
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          description: Template schema for dynamic forms.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateSchemaResponse"
        "404":
          $ref: "#/components/responses/LegacyNotFound"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
  /api/fields/{fieldId}:
    put:
      tags:
        - Fields
      summary: Update field
      parameters:
        - $ref: "#/components/parameters/FieldID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadFieldRequest"
            example:
              name: expectedRevenue
              type: number
              format: currency
              required: false
      responses:
        "200":
          description: Updated field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadField"
        "400":
          $ref: "#/components/responses/LegacyBadRequest"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
    delete:
      tags:
        - Fields
      summary: Delete field
      parameters:
        - $ref: "#/components/parameters/FieldID"
      responses:
        "200":
          $ref: "#/components/responses/DeleteMessage"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
  /api/leads:
    post:
      tags:
        - Leads
      summary: Create lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadRequest"
            example:
              templateId: 1
              data:
                companyName: Acme Corp
                contactEmail: contact@acmecorp.com
                expectedRevenue: "50000.00"
      responses:
        "201":
          description: Lead created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          $ref: "#/components/responses/LegacyBadRequest"
    get:
      tags:
        - Leads
      summary: List leads
      responses:
        "200":
          description: Lead list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
  /api/leads/{id}:
    get:
      tags:
        - Leads
      summary: Get lead
      parameters:
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          description: Lead.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          $ref: "#/components/responses/LegacyNotFound"
    put:
      tags:
        - Leads
      summary: Update lead values
      parameters:
        - $ref: "#/components/parameters/NumericID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadRequest"
            example:
              templateId: 1
              data:
                companyName: Acme Corporation
                contactEmail: contact@acmecorp.com
      responses:
        "200":
          description: Updated lead.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          $ref: "#/components/responses/LegacyBadRequest"
    delete:
      tags:
        - Leads
      summary: Delete lead
      parameters:
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          $ref: "#/components/responses/DeleteMessage"
        "500":
          $ref: "#/components/responses/LegacyInternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    NumericID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    FieldID:
      name: fieldId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    TenantID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    Forbidden:
      description: Authenticated user does not have access.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    Conflict:
      description: Resource conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
    LegacyBadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LegacyErrorResponse"
    LegacyNotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LegacyErrorResponse"
    LegacyInternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LegacyErrorResponse"
    DeleteMessage:
      description: Resource deleted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
  schemas:
    TenantStatus:
      type: string
      enum:
        - active
        - suspended
    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 120
        slug:
          type: string
          minLength: 2
          maxLength: 63
          pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
        description:
          type: string
          maxLength: 1000
        status:
          $ref: "#/components/schemas/TenantStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - status
        - createdAt
        - updatedAt
    CreateTenantRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        slug:
          type: string
          minLength: 2
          maxLength: 63
          description: Optional. If omitted, the service derives one from name.
        description:
          type: string
          maxLength: 1000
      required:
        - name
    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        status:
          $ref: "#/components/schemas/TenantStatus"
    TenantListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        total:
          type: integer
          format: int64
      required:
        - data
        - page
        - pageSize
        - total
    LeadTemplateRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    LeadTemplate:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        createdBy:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        fields:
          type: array
          items:
            $ref: "#/components/schemas/LeadField"
      required:
        - id
        - name
        - createdBy
        - createdAt
    LeadFieldRequest:
      type: object
      properties:
        name:
          type: string
          description: Machine-readable field name used as a key in lead data.
        type:
          type: string
          enum:
            - string
            - number
            - boolean
            - date
            - select
            - textarea
        format:
          type: string
          enum:
            - none
            - email
            - url
            - phone
            - currency
            - percentage
          default: none
        required:
          type: boolean
          default: false
      required:
        - name
        - type
    LeadField:
      allOf:
        - $ref: "#/components/schemas/LeadFieldRequest"
        - type: object
          properties:
            id:
              type: integer
              format: int64
            templateId:
              type: integer
              format: int64
          required:
            - id
            - templateId
    TemplateSchemaResponse:
      type: object
      properties:
        templateId:
          type: integer
          format: int64
        fields:
          type: array
          items:
            $ref: "#/components/schemas/LeadField"
      required:
        - templateId
        - fields
    LeadRequest:
      type: object
      properties:
        templateId:
          type: integer
          format: int64
          minimum: 1
        data:
          type: object
          additionalProperties:
            type: string
      required:
        - templateId
        - data
    Lead:
      type: object
      properties:
        id:
          type: integer
          format: int64
        templateId:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        values:
          type: array
          items:
            $ref: "#/components/schemas/LeadValue"
      required:
        - id
        - templateId
        - createdAt
    LeadValue:
      type: object
      properties:
        id:
          type: integer
          format: int64
        leadId:
          type: integer
          format: int64
        fieldId:
          type: integer
          format: int64
        value:
          type: string
      required:
        - id
        - leadId
        - fieldId
        - value
    APIErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: name is required
          required:
            - code
            - message
      required:
        - error
    LegacyErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: invalid request body
      required:
        - error
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: deleted successfully
      required:
        - message
